function showAddPage(nbId){
  window._addPageNb=nbId;
  window._addPageType=null;
  showModal(`<h2>New Page</h2>
    <p style="color:var(--t3);font-size:13px;margin-bottom:10px">Choose a page type</p>
    <div class="tyg">${PAGE_TYPES.map(t=>`<div class="tyc" id="ptc_${t.id}" onclick="selPageType('${t.id}')">
      <div class="ti">${t.icon}</div><div class="tn">${t.name}</div><div class="td">${t.desc}</div>
    </div>`).join('')}</div>
    <input class="fi" id="pgni" placeholder="Page name…" style="margin-bottom:9px" onkeydown="if(event.key==='Enter')proceedAddPage()">
    <div class="mbtns"><button class="bs" onclick="closeModal()">Cancel</button>
    <button class="bp" id="pg-next-btn" onclick="proceedAddPage()" disabled style="opacity:.5">Next →</button></div>`);
  setTimeout(()=>document.getElementById('pgni')?.focus(),50);
}
function selPageType(t){
  window._addPageType=t;
  document.querySelectorAll('.tyc').forEach(c=>c.classList.remove('on'));
  document.getElementById('ptc_'+t)?.classList.add('on');
  const btn=document.getElementById('pg-next-btn');
  if(btn){btn.disabled=false;btn.style.opacity='1';}
}
function proceedAddPage(){
  const type=window._addPageType;
  if(!type){toast('Choose a page type');return;}
  const name=(document.getElementById('pgni')?.value.trim())||'Untitled';
  window._addPageName=name;
  // Show template choice step
  closeModal();
  setTimeout(()=>showTemplateStep(type,name),50);
}
function showTemplateStep(type,name){
  window._addPageType=type;
  window._addPageName=name;
  if(type!=='rich'){
    finalCreatePage(type,name,null);
    return;
  }
  showModal(`<h2>Choose a Template</h2>
    <p style="font-size:13px;color:var(--t3);margin-bottom:12px">Click a template to use it, or start blank</p>
    <div class="tgrid">${ALL_TEMPLATES.map((t,i)=>`<div class="tcard" onclick="pickTpl(${i})">
      <h3>${t.icon} ${t.name}</h3><p>${t.desc}</p>
    </div>`).join('')}</div>
    <div class="mbtns"><button class="bs" onclick="closeModal();finalCreatePage(window._addPageType,window._addPageName,null)">Blank Page</button></div>`);
}
function pickTpl(i){
  const tpl=ALL_TEMPLATES[i];
  window._selTplIdx=i;
  closeModal();
  setTimeout(()=>showTplFillIn(window._addPageType,window._addPageName,tpl),50);
}
function showTplFillIn(type,name,tpl){
  window._addPageType=type;
  window._addPageName=name;
  if(!tpl.fields||!tpl.fields.length){
    finalCreatePage(type,name,tpl.content);
    return;
  }
  const fieldsHtml=tpl.fields.map((f,i)=>`<div class="tmpl-field">
    <label>${f.label}</label>
    <input class="fi" id="tf${i}" placeholder="${esc(f.placeholder)}" value="${esc(f.default||'')}">
  </div>`).join('');
  showModal(`<h2>${tpl.icon} ${tpl.name}</h2>
    <p style="font-size:12px;color:var(--t3);margin-bottom:12px">Fill in the blanks (or leave empty for defaults)</p>
    ${fieldsHtml}
    <div class="mbtns"><button class="bs" onclick="closeModal();finalCreatePage(window._addPageType,window._addPageName,null)">Skip</button>
    <button class="bp" onclick="doFillTpl(window._selTplIdx)">Create Page</button></div>`);
}
function doFillTpl(tplIdx){
  const type=window._addPageType;
  const name=window._addPageName;
  const tpl=ALL_TEMPLATES[tplIdx];
  let content=tpl.content;
  (tpl.fields||[]).forEach((f,i)=>{
    const val=document.getElementById('tf'+i)?.value||f.default||'';
    content=content.replace(new RegExp('\\{\\{'+f.key+'\\}\\}','g'),esc(val));
  });
  // Also apply the page name into any {{pagename}} placeholder in the template
  content=content.replace(/\{\{pagename\}\}/g,esc(name));
  closeModal();
  finalCreatePage(type,name,content);
}
function finalCreatePage(type,name,content){
  const nbId=window._addPageNb;
  if(!nbId) return;
  const page={id:'pg'+Date.now(),name:name||'Untitled',type:type,
    content:content||'',strokes:[],codeContent:'',codeLang:'javascript',quizText:'',notes:''};
  if(!A.pages[nbId]) A.pages[nbId]=[];
  A.pages[nbId].push(page);
  saveA();renderSB();openPage(nbId,page.id);
}

function showWelcome(){
  A.activePage=null;A.activeView=null;
  document.getElementById('tbtit').innerHTML='SimpleTonNote';
  document.getElementById('tpl-btn').style.display='none';
  document.getElementById('exp-btn').style.display='none';
  document.getElementById('con').innerHTML=`<div class="welcome" id="welcome"><div class="wgem">✦</div><h2>Welcome to SimpleTonNote</h2><p style="font-size:13px">Select or create a notebook to begin.</p></div>`;
}
function openPage(nbId,pgId){
  const nb=A.notebooks.find(n=>n.id===nbId);
  const pg=(A.pages[nbId]||[]).find(p=>p.id===pgId);
  if(!nb||!pg) return;
  A.activeNotebook=nbId;A.activePage=pgId;A.activeView='page';
  A._nbOpen=A._nbOpen||{};A._nbOpen[nbId]=true;
  document.getElementById('tbtit').innerHTML=`${nb.icon} <strong>${esc(pg.name)}</strong>`;
  document.getElementById('tpl-btn').style.display=pg.type==='rich'?'':'none';
  document.getElementById('exp-btn').style.display=(pg.type==='rich'||pg.type==='code'||pg.type==='finite')&&pg.type!=='quiz'?'':'none';
  renderSB();
  if(pg.type==='rich') openRich(pg);
  else if(pg.type==='canvas') openInfCanvas(pg);
  else if(pg.type==='finite') openFinCanvas(pg);
  else if(pg.type==='code') openCode(pg);
  else if(pg.type==='quiz') openQuiz(pg);
}

function esc(s){if(!s) return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function stripHtml(s){return s?s.replace(/<[^>]*>/g,''):''}
function uid(){return 'x'+Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
function toast(msg,dur=2400){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),dur);
}
function showModal(html){
  let ov=document.getElementById('movl');
  if(!ov){ov=document.createElement('div');ov.id='movl';ov.className='movl';
    ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});
    document.body.appendChild(ov);}
  ov.style.display='flex';
  ov.innerHTML=`<div class="mod">${html}</div>`;
}
function showWideModal(html){
  let ov=document.getElementById('movl');
  if(!ov){ov=document.createElement('div');ov.id='movl';ov.className='movl';
    ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});
    document.body.appendChild(ov);}
  ov.style.display='flex';
  ov.innerHTML=`<div class="mod mod-wide">${html}</div>`;
}
function closeModal(){const ov=document.getElementById('movl');if(ov) ov.style.display='none';}

function showTemplates(){
  const cats=Object.keys(TEMPLATE_CATS);
  let html=`<h2>📋 Templates</h2><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px" id="tpl-cat-tabs">`;
  html+=`<button class="tpl-tab on" onclick="filterTplCat(null,this)">All</button>`;
  cats.forEach(c=>html+=`<button class="tpl-tab" onclick="filterTplCat('${c}',this)">${TEMPLATE_CATS[c].icon} ${c}</button>`);
  html+=`</div><div class="template-grid" id="tpl-grid"></div>
    <div class="mbtns"><button class="bs" onclick="closeModal()">Cancel</button></div>`;
  showModal(html);
  renderTplGrid(null);
}

function filterTplCat(cat,btn){
  document.querySelectorAll('.tpl-tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderTplGrid(cat);
}
function renderTplGrid(cat){
  const grid=document.getElementById('tpl-grid');if(!grid) return;
  const items=cat?ALL_TEMPLATES.filter(t=>t.cat===cat):ALL_TEMPLATES;
  grid.innerHTML=items.map((t,i)=>``+
    `<div class="template-card" onclick="applyTemplate(${ALL_TEMPLATES.indexOf(t)})">
      <div style="font-size:20px;margin-bottom:4px">${t.icon}</div>
      <h3>${t.name}</h3>
      <p>${t.desc}</p>
      ${t.cat!=='Blank'?`<div style="font-size:10px;margin-top:4px;opacity:.6">${TEMPLATE_CATS[t.cat]?.icon||''} ${t.cat}</div>`:''}
    </div>`).join('');
}

function applyTemplate(i){
  const t=ALL_TEMPLATES[i];
  if(!t) return;
  if(t.fields&&t.fields.length){
    showTplFillIn(window._addPageType||'rich', window._addPageName||t.name, t);
    return;
  }
  const body=document.getElementById('eb');
  if(body){body.innerHTML=t.content;if(_curPg){_curPg.content=t.content;saveA();}}
  closeModal();
}

function togglePgTaskPanel(){
  const p=document.getElementById('pg-tasks-panel');

}
function renderPgTasks(pgId,nbId){
  const body=document.getElementById('pgtask-body');
  const cnt=document.getElementById('pgtask-count');
  if(!body) return;
  const allTasks=Object.values(A.tasks).flat().filter(t=>t.pageLink===pgId);
  const nbTasks=(A.tasks[nbId]||[]);
  const relevant=[...allTasks,...nbTasks.filter(t=>!t.pageLink||t.pageLink===pgId)];
  const unique=[...new Map(relevant.map(t=>[t.id,t])).values()];
  const done=unique.filter(t=>t.done).length;
  if(cnt) cnt.textContent=unique.length?(done+'/'+unique.length+' done'):'no tasks';
  if(!unique.length){
    body.innerHTML='<div style="font-size:12px;color:var(--t3);padding:4px">No tasks for this page. <span style="color:var(--ac2);cursor:pointer" onclick="showAddTaskModal(&#39;&#39;)">+ Add</span></div>';
    return;
  }
  body.innerHTML=unique.map(function(t){
    return '<div class="pgtk-mini'+(t.done?' done':'')+'"><input type="checkbox" '+(t.done?'checked ':'')+' onchange="quickTogglePgTask(&#39;'+t.id+'&#39;,&#39;'+(nbId||'')+'&#39;,this)"><span class="ptname">'+esc(t.name)+'</span>'+(t.dueDate?'<span class="ptdate">'+t.dueDate+'</span>':'')+'</div>';
  }).join('');
}
function quickTogglePgTask(id,nbId,el){
  const task=findTask(id,nbId);
  if(task){task.done=el.checked;saveA();}
  const row=el.closest('.pgtk-mini');
  if(row) row.classList.toggle('done',el.checked);
}

// ══ GLOBAL BUTTON RIGHT-CLICK ══
document.addEventListener('contextmenu',e=>{
  const btn=e.target.closest('button:not([data-no-ctx]),[data-ctx-label]');
  if(!btn) return;
  // Already handled (table cells, canvas, etc.) — skip if stopPropagation was called
  // Build a basic right-click menu for any button
  const label=btn.title||btn.dataset.ctxLabel||btn.textContent?.trim().slice(0,30)||'Button';
  const onclickFn=btn.getAttribute('onclick')||'';
  if(!onclickFn&&!btn.title) return; // nothing useful
  e.preventDefault();
  e.stopPropagation();
  showCtx(e.clientX,e.clientY,[
    {icon:'▶',label:`Run: ${label}`,fn:onclickFn||''},
    {icon:'📋',label:'Copy action',fn:`navigator.clipboard?.writeText(${JSON.stringify(label)})`},
  ]);
},true); // capture phase so we see it before any element handlers

function execCmd(cmd,val=null){
  document.getElementById('eb')?.focus();
  document.execCommand(cmd,false,val);
  updateTbState();
}
function updateTbState(){
  ['bold','italic','underline','strikeThrough'].forEach(c=>{
    const id='tb-'+{bold:'b',italic:'i',underline:'u',strikeThrough:'s'}[c];
    const el=document.getElementById(id);
    if(el) el.classList.toggle('on',document.queryCommandState(c));
  });
}
function setFontSize(sz){
  if(!sz) return;
  document.execCommand('fontSize',false,'7');
  document.getElementById('eb')?.querySelectorAll('font[size="7"]').forEach(s=>{s.removeAttribute('size');s.style.fontSize=sz;});
}

function insCheckbox(){
  const id='cb'+uid();
  const html=`<div class="fcb" id="${id}"><input type="checkbox" onchange="this.nextElementSibling.classList.toggle('done',this.checked)"><span class="cbt" contenteditable="true" data-placeholder="To-do item…"></span><button class="fcb-del" onclick="deleteCB('${id}')" title="Delete">✕</button></div>`;
  document.execCommand('insertHTML',false,html);
  // Focus the text part
  setTimeout(()=>{
    const cb=document.getElementById(id);
    if(cb){
      const span=cb.querySelector('.cbt');
      if(span){span.focus();placeCaret(span,0);}
    }
  },30);
}
function deleteCB(id){
  const el=document.getElementById(id);
  if(el){el.remove();if(_curPg){_curPg.content=document.getElementById('eb').innerHTML;saveA();}}
}
function placeCaret(el,offset){
  const range=document.createRange();
  const sel=window.getSelection();
  try{range.setStart(el,offset);range.collapse(true);sel.removeAllRanges();sel.addRange(range);}catch(e){}
}

function richKeydown(e){
  if(e.key==='Tab'){e.preventDefault();execCmd('insertHTML','&nbsp;&nbsp;&nbsp;&nbsp;');return;}
  if(e.key==='Enter'){
    const sel=window.getSelection();
    if(!sel.rangeCount) return;
    const anc=sel.anchorNode;
    const cb=anc?.closest?.('.fcb')||anc?.parentElement?.closest('.fcb');
    if(cb){
      e.preventDefault();
      // Add new checkbox after
      const id2='cb'+uid();
      const newCb=document.createElement('div');
      newCb.className='fcb';newCb.id=id2;
      newCb.innerHTML=`<input type="checkbox"><span class="cbt" contenteditable="true"></span><button class="fcb-del" onclick="deleteCB('${id2}')">✕</button>`;
      cb.after(newCb);
      const sp=newCb.querySelector('.cbt');sp?.focus();
      return;
    }
    // Backspace on empty checkbox = delete it
  }
  if(e.key==='Backspace'){
    const sel=window.getSelection();
    if(!sel.rangeCount) return;
    const anc=sel.anchorNode;
    const cbt=anc?.closest?.('.cbt')||anc?.parentElement?.closest('.cbt');
    if(cbt&&(cbt.textContent||'').trim()===''){
      e.preventDefault();
      const cb=cbt.closest('.fcb');
      if(cb){
        const prev=cb.previousElementSibling;
        cb.remove();
        if(prev&&prev.classList.contains('fcb')){
          const sp=prev.querySelector('.cbt');
          if(sp){sp.focus();placeCaret(sp,(sp.childNodes.length));}
        } else {
          document.getElementById('eb')?.focus();
        }
        if(_curPg){_curPg.content=document.getElementById('eb').innerHTML;saveA();}
      }
      return;
    }
  }
  // Markdown shortcuts
  if(e.key===' '){
    const sel=window.getSelection();
    if(!sel.rangeCount) return;
    const range=sel.getRangeAt(0);
    const node=range.startContainer;
    if(node.nodeType===3){
      const txt=node.textContent.slice(0,range.startOffset);
      if(/^#{1,3}$/.test(txt)){
        e.preventDefault();
        const lvl={'#':'h1','##':'h2','###':'h3'}[txt]||'p';
        execCmd('formatBlock',lvl);
        node.textContent='';
      } else if(txt==='-'||txt==='*'){
        e.preventDefault();
        node.textContent='';
        execCmd('insertUnorderedList');
      } else if(txt==='1.'){
        e.preventDefault();
        node.textContent='';
        execCmd('insertOrderedList');
      } else if(txt==='[]'||txt==='[ ]'){
        e.preventDefault();
        node.textContent='';
        insCheckbox();
      } else if(txt==='>'){
        e.preventDefault();
        node.textContent='';
        execCmd('formatBlock','blockquote');
      } else if(txt==='---'){
        e.preventDefault();
        node.textContent='';
        insHr();
      }
    }
  }
  updateTbState();
}

function handlePaste(e){
  const items=e.clipboardData?.items;
  if(!items) return;
  for(const item of items){
    if(item.type.startsWith('image/')){
      e.preventDefault();
      const blob=item.getAsFile();
      const reader=new FileReader();
      reader.onload=ev=>{
        execCmd('insertHTML',`<img src="${ev.target.result}" style="max-width:100%;border-radius:7px">`);
      };
      reader.readAsDataURL(blob);
      return;
    }
  }
}

function processChips(eb){
  if(A.settings.smartChips===false) return;
  eb.querySelectorAll('a').forEach(a=>{
    const href=a.href;
    if(a.querySelector('.schip')) return;
    let icon='🔗',label=a.textContent||href;
    if(href.includes('youtube.com')||href.includes('youtu.be')){icon='▶️';label='YouTube';}
    else if(href.includes('github.com')){icon='⚙';label='GitHub';}
    else if(href.includes('docs.google.com')){icon='📄';label='Google Doc';}
    else if(href.includes('drive.google.com')){icon='💾';label='Drive';}
    else if(href.includes('figma.com')){icon='🎨';label='Figma';}
    a.innerHTML=`<span class="schip">${icon} ${label}</span>`;
    a.target='_blank';a.rel='noopener';
  });
}

function insCodeBlock(){
  const id='cbk'+uid();
  const cbHtml=`<div class="cbw" id="${id}" contenteditable="false"><div class="cbhdr"><select class="lsel" onchange="hlCB('${id}')"><option>javascript</option><option>python</option><option>java</option><option>c++</option><option>c</option><option>rust</option><option>go</option><option>html</option><option>css</option><option>sql</option><option>bash</option><option>json</option><option>typescript</option></select><button class="cbbtn" onclick="copyCB('${id}')">Copy</button></div><pre class="cbcode language-javascript"><code class="language-javascript" contenteditable="true" spellcheck="false">// code here</code></pre></div>`;
  execCmd('insertHTML',cbHtml);
  // Prism highlight on focus out
  setTimeout(()=>{
    const cb=document.getElementById(id);
    if(!cb) return;
    const code=cb.querySelector('code');
    if(code){
      code.addEventListener('blur',()=>hlCB(id));
      code.addEventListener('focus',()=>{
        // save raw text, unhighlight for editing
        const raw=code.textContent;
        code.textContent=raw;
      });
    }
  },50);
}
function hlCB(id){
  const cb=document.getElementById(id);if(!cb) return;
  const lsel=cb.querySelector('.lsel');
  const code=cb.querySelector('code');
  if(!code||!lsel) return;
  const lang=lsel.value.replace('c++','cpp').replace('html','markup');
  const raw=code.textContent;
  code.className=`language-${lang}`;
  code.closest('pre').className=`cbcode language-${lang}`;
  if(typeof Prism!=='undefined') Prism.highlightElement(code);
}
function copyCB(id){
  const cb=document.getElementById(id);if(!cb) return;
  navigator.clipboard?.writeText(cb.querySelector('.cbcode').textContent);toast('Copied!');
}

function rKatex(latex,display=false){
  if(typeof katex==='undefined') return `<code>${esc(latex)}</code>`;
  try{return katex.renderToString(latex,{displayMode:display,throwOnError:false,output:'html'});}
  catch(e){return `<code style="color:var(--rd)">${esc(latex)}</code>`;}
}

function smoothPoints(pts,tension=0.4,steps=8){
  if(pts.length<3) return pts;
  const out=[];
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[Math.max(0,i-1)];
    const p1=pts[i];
    const p2=pts[Math.min(pts.length-1,i+1)];
    const p3=pts[Math.min(pts.length-1,i+2)];
    for(let s=0;s<steps;s++){
      const t=s/steps,t2=t*t,t3=t2*t;
      const m1={x:tension*(p2.x-p0.x),y:tension*(p2.y-p0.y)};
      const m2={x:tension*(p3.x-p1.x),y:tension*(p3.y-p1.y)};
      out.push({
        x:(2*t3-3*t2+1)*p1.x+(t3-2*t2+t)*m1.x+(-2*t3+3*t2)*p2.x+(t3-t2)*m2.x,
        y:(2*t3-3*t2+1)*p1.y+(t3-2*t2+t)*m1.y+(-2*t3+3*t2)*p2.y+(t3-t2)*m2.y,
        p:p1.p||1
      });
    }
  }
  out.push(pts[pts.length-1]);
  return out;
}

          <div class="cpw" style="display:inline-flex;align-items:center" title="Custom color">
            <div class="ccd" style="background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red)"></div>
            <input type="color" onchange="setCVColor(this.value,null)">
          </div>
        </div>
        <div class="cvsep"></div>
        <input type="range" class="szsl" min="1" max="28" value="${CS.size}" oninput="CS.size=+this.value" title="Brush size">
        <div class="cvsep"></div>
        <button class="bgtg on" id="bg-lined" onclick="setCVBg('lined',this)">Lines</button>
        <button class="bgtg" id="bg-graph" onclick="setCVBg('graph',this)">Grid</button>
        <button class="bgtg" id="bg-blank" onclick="setCVBg('blank',this)">Blank</button>
        <div class="cvsep"></div>
        <button class="cvb" onclick="cvUndo()" title="Undo">↩</button>
        <button class="cvb" onclick="cvRedo()" title="Redo">↪</button>
        <button class="cvb" onclick="cvClear()" title="Clear">🗑</button>
      </div>
      <!-- Shape popup menu -->
      <div id="cv-shape-popup" class="cv-shape-popup" style="display:none">
        <button onclick="setSelectedFill(false)">◻ Outline</button>
        <button onclick="setSelectedFill(true)">◼ Filled</button>
        <button onclick="setSelectedFill('translucent')">◈ Translucent</button>
        <button onclick="deleteSelected()" style="color:var(--rd)">🗑 Delete</button>
      </div>
    </div>`;
  initCV(pg,infinite);
}

function initCV(pg,infinite){
  const wrap=document.getElementById('cvw');
  const cv=document.getElementById('cv');
  CS.strokes=pg.strokes||[];
  CS.redo=[];
  CS.ox=0;CS.oy=0;CS.scale=1;
  CS.selected=null;
  if(!infinite){
    cv.width=900;cv.height=600;
    cv.style.margin='auto';cv.style.marginTop='60px';
    cv.style.display='block';cv.style.borderRadius='10px';
    cv.style.border='1px solid var(--bd)';
  } else {
    cv.width=wrap.offsetWidth;cv.height=wrap.offsetHeight;
  }
  drawCV();
  initCVToolbarDrag();

  let ptrs={},pinchDist=null,pinchCenter=null;

  cv.addEventListener('pointerdown',e=>{
    cv.setPointerCapture(e.pointerId);
    ptrs[e.pointerId]={x:e.clientX,y:e.clientY};
    if(Object.keys(ptrs).length===2){
      const keys=Object.keys(ptrs);
      const dx=ptrs[keys[0]].x-ptrs[keys[1]].x;
      const dy=ptrs[keys[0]].y-ptrs[keys[1]].y;
      pinchDist=Math.sqrt(dx*dx+dy*dy);
      pinchCenter={x:(ptrs[keys[0]].x+ptrs[keys[1]].x)/2, y:(ptrs[keys[0]].y+ptrs[keys[1]].y)/2};
      return;
    }
    hideShapePopup();
    // Space held = pan regardless of tool
    if(CS.spaceDown||CS.tool==='pan'){
      CS.panning=true;CS.lastX=e.clientX;CS.lastY=e.clientY;
      cv.style.cursor='grabbing';return;
    }
    const p=cvPos(cv,e);
    if(CS.tool==='select'){
      // Check if clicking a shape
      const hit=hitTestStrokes(p);
      if(hit){
        CS.selected=hit;
        CS.selDrag=true;
        CS.selDragOff={x:p.x-strokeCenter(hit).x, y:p.y-strokeCenter(hit).y};
        showShapePopup(e.clientX,e.clientY);
      } else {
        CS.selected=null;
        CS.selBox={x1:p.x,y1:p.y,x2:p.x,y2:p.y};
      }
      drawCV();return;
    }
    if(CS.tool==='eraser'){
      // Erase stroke at point
      const hit=hitTestStrokes(p);
      if(hit){ CS.redo.push(hit); CS.strokes.splice(CS.strokes.indexOf(hit),1); drawCV(); pg.strokes=CS.strokes;saveA(); }
      return;
    }
    CS.drawing=true;CS.pts=[{...p,p:e.pressure||1}];
    CS.shapeStart=p;
    if(!CS.shape){
      const s={tool:CS.tool,color:CS.color,size:CS.size,
        opacity:CS.tool==='highlight'?.38:CS.tool==='pencil'?.65:1,pts:[p]};
      CS.strokes.push(s);
    }
  });

  cv.addEventListener('pointermove',e=>{
    ptrs[e.pointerId]={x:e.clientX,y:e.clientY};
    const pkeys=Object.keys(ptrs);
    // Pinch zoom toward pinch center
    if(pkeys.length===2&&pinchDist!==null){
      const dx=ptrs[pkeys[0]].x-ptrs[pkeys[1]].x;
      const dy=ptrs[pkeys[0]].y-ptrs[pkeys[1]].y;
      const nd=Math.sqrt(dx*dx+dy*dy);
      const factor=nd/pinchDist;
      const rect=cv.getBoundingClientRect();
      const cx=(pinchCenter.x-rect.left);
      const cy=(pinchCenter.y-rect.top);
      zoomToward(cx,cy,factor);
      pinchDist=nd;
      drawCV();updateZoomLbl();return;
    }
    if(CS.panning){
      CS.ox+=e.clientX-CS.lastX;CS.oy+=e.clientY-CS.lastY;
      CS.lastX=e.clientX;CS.lastY=e.clientY;
      drawCV();return;
    }
    if(CS.tool==='select'&&CS.selDrag&&CS.selected){
      const p=cvPos(cv,e);
      moveStroke(CS.selected, p.x-CS.selDragOff.x, p.y-CS.selDragOff.y);
      drawCV();return;
    }
    if(CS.tool==='select'&&CS.selBox){
      const p=cvPos(cv,e);
      CS.selBox.x2=p.x;CS.selBox.y2=p.y;drawCV();return;
    }
    if(CS.tool==='eraser'&&e.buttons){
      const p=cvPos(cv,e);
      const hit=hitTestStrokes(p);
      if(hit){ CS.redo.push(hit); CS.strokes.splice(CS.strokes.indexOf(hit),1); drawCV(); pg.strokes=CS.strokes;saveA(); }
      return;
    }
    if(!CS.drawing) return;
    const p=cvPos(cv,e);
    CS.pts.push({...p,p:e.pressure||1});
    if(CS.shape){
      drawCV();drawShapePreview(p);
    } else {
      const s=CS.strokes[CS.strokes.length-1];
      if(s){s.pts=[...CS.pts];drawCV();}
    }
  });

  cv.addEventListener('pointerup',e=>{
    delete ptrs[e.pointerId];
    if(Object.keys(ptrs).length<2) pinchDist=null;
    CS.selDrag=false;
    if(CS.panning){CS.panning=false;cv.style.cursor=CS.spaceDown?'grab':CS.tool==='pan'?'grab':'crosshair';return;}
    if(CS.tool==='select'){
      if(CS.selBox){ CS.selBox=null;drawCV(); }
      return;
    }
    if(!CS.drawing) return;
    CS.drawing=false;
    const p=cvPos(cv,e);
    if(CS.shape){
      CS.strokes.push({tool:'shape',shape:CS.shape,color:CS.color,size:CS.size,
        x1:CS.shapeStart.x,y1:CS.shapeStart.y,x2:p.x,y2:p.y,opacity:1,fill:CS.fillShape});
    } else {
      const s=CS.strokes[CS.strokes.length-1];
      if(s&&s.pts) s.pts=smoothPoints(CS.pts);
    }
    CS.pts=[];drawCV();
    pg.strokes=CS.strokes;saveA();
  });

  cv.addEventListener('pointercancel',e=>{
    delete ptrs[e.pointerId];CS.drawing=false;CS.panning=false;CS.selDrag=false;
  });

  // Click on shape (single tap/click) - show popup
  cv.addEventListener('click',e=>{
    if(CS.tool==='select'){
      const p=cvPos(cv,e);
      const hit=hitTestStrokes(p);
      if(hit){ CS.selected=hit; showShapePopup(e.clientX,e.clientY); drawCV(); }
    }
  });

  if(infinite){
    // Wheel zoom toward mouse position
    cv.addEventListener('wheel',e=>{
      e.preventDefault();
      const factor=e.deltaY<0?1.1:.91;
      const rect=cv.getBoundingClientRect();
      zoomToward(e.clientX-rect.left, e.clientY-rect.top, factor);
      drawCV();updateZoomLbl();
    },{passive:false});
  }

  // Space bar pan
  window._cvSpaceHandler = e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
    if(e.code==='Space'&&!CS.spaceDown){
      CS.spaceDown=true;
      const cv2=document.getElementById('cv');
      if(cv2&&CS.tool!=='pan') cv2.style.cursor='grab';
    }
  };
  window._cvSpaceUpHandler = e=>{
    if(e.code==='Space'){
      CS.spaceDown=false;
      const cv2=document.getElementById('cv');
      if(cv2&&CS.tool!=='pan') cv2.style.cursor='crosshair';
    }
  };
  document.addEventListener('keydown',window._cvSpaceHandler);
  document.addEventListener('keyup',window._cvSpaceUpHandler);

  window.addEventListener('resize',()=>{
    if(infinite){cv.width=wrap.offsetWidth;cv.height=wrap.offsetHeight;}
    drawCV();
  });
}

function zoomToward(cx,cy,factor){
  const newScale=Math.max(.1,Math.min(10,CS.scale*factor));
  // Adjust offset so the point under cursor stays fixed
  CS.ox=cx-(cx-CS.ox)*(newScale/CS.scale);
  CS.oy=cy-(cy-CS.oy)*(newScale/CS.scale);
  CS.scale=newScale;
}

function initCVToolbarDrag(){
  const tb=document.getElementById('cvtb');
  const grip=document.getElementById('cvtb-grip');
  if(!tb||!grip) return;
  let dx=0,dy=0,startX=0,startY=0;
  grip.addEventListener('pointerdown',e=>{
    e.stopPropagation();
    grip.setPointerCapture(e.pointerId);
    CS.tbDragging=true;
    const rect=tb.getBoundingClientRect();
    CS.tbDragOff={x:e.clientX-rect.left, y:e.clientY-rect.top};
    tb.style.transition='none';
    tb.style.bottom='auto';
    tb.style.left=rect.left+'px';
    tb.style.top=rect.top+'px';
    tb.style.transform='none';
  });
  grip.addEventListener('pointermove',e=>{
    if(!CS.tbDragging) return;
    const x=e.clientX-CS.tbDragOff.x;
    const y=e.clientY-CS.tbDragOff.y;
    tb.style.left=x+'px';
    tb.style.top=y+'px';
  });
  grip.addEventListener('pointerup',()=>{ CS.tbDragging=false; });
}

// Hit test: find topmost stroke at canvas point p
function hitTestStrokes(p){
  const tol=12/CS.scale;
  for(let i=CS.strokes.length-1;i>=0;i--){
    const s=CS.strokes[i];
    if(s.tool==='shape'){
      const minX=Math.min(s.x1,s.x2)-tol,maxX=Math.max(s.x1,s.x2)+tol;
      const minY=Math.min(s.y1,s.y2)-tol,maxY=Math.max(s.y1,s.y2)+tol;
      if(p.x>=minX&&p.x<=maxX&&p.y>=minY&&p.y<=maxY) return s;
    } else if(s.pts&&s.pts.length){
      for(const pt of s.pts){
        if(Math.abs(pt.x-p.x)<tol*2&&Math.abs(pt.y-p.y)<tol*2) return s;
      }
    }
  }
  return null;
}

function strokeCenter(s){
  if(s.tool==='shape') return {x:(s.x1+s.x2)/2,y:(s.y1+s.y2)/2};
  if(s.pts&&s.pts.length){
    let sx=0,sy=0;
    s.pts.forEach(p=>{sx+=p.x;sy+=p.y;});
    return {x:sx/s.pts.length,y:sy/s.pts.length};
  }
  return {x:0,y:0};
}

function moveStroke(s,cx,cy){
  if(s.tool==='shape'){
    const hw=(s.x2-s.x1)/2,hh=(s.y2-s.y1)/2;
    s.x1=cx-hw;s.y1=cy-hh;s.x2=cx+hw;s.y2=cy+hh;
  } else if(s.pts&&s.pts.length){
    const c=strokeCenter(s);
    const dx=cx-c.x,dy=cy-c.y;
    s.pts=s.pts.map(p=>({...p,x:p.x+dx,y:p.y+dy}));
  }
}

function showShapePopup(clientX,clientY){
  const pop=document.getElementById('cv-shape-popup');
  if(!pop) return;
  pop.style.display='flex';
  pop.style.left=Math.min(clientX,window.innerWidth-160)+'px';
  pop.style.top=Math.max(8,(clientY-100))+'px';
}
function hideShapePopup(){
  const pop=document.getElementById('cv-shape-popup');
  if(pop) pop.style.display='none';
  CS.selected=null;
}
function setSelectedFill(mode){
  if(!CS.selected) return;
  if(CS.selected.tool==='shape'){
    CS.selected.fill=mode==='filled'||mode===true;
    CS.selected.opacity=mode==='translucent'?.35:1;
  } else {
    CS.selected.opacity=mode==='translucent'?.35:1;
  }
  hideShapePopup();
  drawCV();
  if(_curPg){_curPg.strokes=CS.strokes;saveA();}
}
function deleteSelected(){
  if(!CS.selected) return;
  const idx=CS.strokes.indexOf(CS.selected);
  if(idx>=0) CS.strokes.splice(idx,1);
  CS.redo=[];
  hideShapePopup();drawCV();
  if(_curPg){_curPg.strokes=CS.strokes;saveA();}
}

function cvPos(cv,e){
  const r=cv.getBoundingClientRect();
  return {x:(e.clientX-r.left-CS.ox)/CS.scale,y:(e.clientY-r.top-CS.oy)/CS.scale};
}
function cvZoom(f,cx,cy){
  const cv=document.getElementById('cv');
  if(cv&&cx==null){const r=cv.getBoundingClientRect();cx=r.width/2;cy=r.height/2;}
  zoomToward(cx||0,cy||0,f);
  drawCV();updateZoomLbl();
}
function cvReset(){CS.scale=1;CS.ox=0;CS.oy=0;drawCV();updateZoomLbl();}
function updateZoomLbl(){const l=document.getElementById('czlbl');if(l) l.textContent=Math.round(CS.scale*100)+'%';}

function drawCV(){
  const cv=document.getElementById('cv');if(!cv) return;
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.save();
  ctx.translate(CS.ox,CS.oy);
  ctx.scale(CS.scale,CS.scale);
  drawCVBg(ctx,cv);
  CS.strokes.forEach(s=>{
    const isSel=s===CS.selected;
    if(s.tool==='shape') drawShape(ctx,s,isSel); else drawStroke(ctx,s,isSel);
  });
  // Draw selection box
  if(CS.selBox){
    ctx.save();
    ctx.strokeStyle='var(--ac)';ctx.lineWidth=1/CS.scale;
    ctx.setLineDash([4/CS.scale]);
    ctx.strokeRect(CS.selBox.x1,CS.selBox.y1,CS.selBox.x2-CS.selBox.x1,CS.selBox.y2-CS.selBox.y1);
    ctx.restore();
  }
  ctx.restore();
}

function drawShapePreview(p2){
  const cv=document.getElementById('cv');if(!cv) return;
  const ctx=cv.getContext('2d');
  ctx.save();ctx.translate(CS.ox,CS.oy);ctx.scale(CS.scale,CS.scale);
  drawShape(ctx,{tool:'shape',shape:CS.shape,color:CS.color,size:CS.size,
    x1:CS.shapeStart.x,y1:CS.shapeStart.y,x2:p2.x,y2:p2.y,opacity:.7,fill:CS.fillShape});
  ctx.restore();
}

function toggleCVFill(btn){
  CS.fillShape=!CS.fillShape;
  if(btn) btn.classList.toggle('on',CS.fillShape);
}

function drawShape(ctx,s,selected=false){
  const {x1,y1,x2,y2,color,size,shape,opacity,fill}=s;
  ctx.save();ctx.strokeStyle=color;ctx.lineWidth=size;ctx.globalAlpha=opacity||1;
  ctx.lineCap='round';ctx.lineJoin='round';
  if(fill){ctx.fillStyle=color;}
  const w=x2-x1,h=y2-y1;
  if(shape==='rect'){
    if(fill){ctx.globalAlpha=(opacity||1)*0.3;ctx.fillRect(x1,y1,w,h);ctx.globalAlpha=opacity||1;}
    ctx.strokeRect(x1,y1,w,h);
  } else if(shape==='circle'){
    ctx.beginPath();ctx.ellipse(x1+w/2,y1+h/2,Math.abs(w/2),Math.abs(h/2),0,0,Math.PI*2);
    if(fill){ctx.globalAlpha=(opacity||1)*0.3;ctx.fill();ctx.globalAlpha=opacity||1;}
    ctx.stroke();
  } else if(shape==='triangle'){
    ctx.beginPath();
    ctx.moveTo(x1+w/2,y1);ctx.lineTo(x2,y2);ctx.lineTo(x1,y2);ctx.closePath();
    if(fill){ctx.globalAlpha=(opacity||1)*0.3;ctx.fill();ctx.globalAlpha=opacity||1;}
    ctx.stroke();
  } else if(shape==='line'){
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  } else if(shape==='arrow'){
    const angle=Math.atan2(y2-y1,x2-x1);
    const hl=Math.min(26,Math.sqrt(w*w+h*h)*.3+8);
    const hw=Math.PI/6;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x2,y2);ctx.lineTo(x2-hl*Math.cos(angle-hw),y2-hl*Math.sin(angle-hw));
    ctx.moveTo(x2,y2);ctx.lineTo(x2-hl*Math.cos(angle+hw),y2-hl*Math.sin(angle+hw));
    ctx.lineWidth=size*1.3;ctx.stroke();
  }
  if(selected){
    ctx.strokeStyle='var(--ac)';ctx.lineWidth=2/CS.scale;ctx.globalAlpha=1;ctx.setLineDash([5/CS.scale]);
    ctx.strokeRect(Math.min(x1,x2)-4,Math.min(y1,y2)-4,Math.abs(w)+8,Math.abs(h)+8);
  }
  ctx.restore();
}

function drawStroke(ctx,s,selected=false){
  if(!s.pts||!s.pts.length) return;
  ctx.save();
  if(s.tool==='eraser'){
    ctx.globalCompositeOperation='destination-out';
    ctx.strokeStyle='rgba(0,0,0,1)';
    ctx.lineWidth=s.size*5;
  } else {
    ctx.globalCompositeOperation='source-over';
    ctx.globalAlpha=s.opacity||1;
    ctx.strokeStyle=s.color;
    ctx.lineWidth=s.tool==='highlight'?s.size*7:s.size;
    if(s.tool==='pencil'){ctx.globalAlpha=(s.opacity||.65);ctx.lineWidth=s.size;}
  }
  ctx.lineCap='round';ctx.lineJoin='round';
  if(s.pts.length===1){
    ctx.beginPath();ctx.arc(s.pts[0].x,s.pts[0].y,ctx.lineWidth/2,0,Math.PI*2);ctx.fill();
  } else {
    ctx.beginPath();ctx.moveTo(s.pts[0].x,s.pts[0].y);
    for(let i=1;i<s.pts.length;i++) ctx.lineTo(s.pts[i].x,s.pts[i].y);
    ctx.stroke();
  }
  if(selected){
    ctx.restore();ctx.save();
    ctx.strokeStyle='var(--ac)';ctx.lineWidth=1.5/CS.scale;ctx.globalAlpha=.7;
    ctx.setLineDash([4/CS.scale]);
    const xs=s.pts.map(p=>p.x),ys=s.pts.map(p=>p.y);
    const bx=Math.min(...xs),by=Math.min(...ys),bw=Math.max(...xs)-bx,bh=Math.max(...ys)-by;
    ctx.strokeRect(bx-6,by-6,bw+12,bh+12);
  }
  ctx.restore();
}

function drawCVBg(ctx,cv){
  const w=(cv.width)/CS.scale+Math.abs(CS.ox/CS.scale)+400;
  const h=(cv.height)/CS.scale+Math.abs(CS.oy/CS.scale)+400;
  const ox2=-CS.ox/CS.scale-200;
  const oy2=-CS.oy/CS.scale-200;
  const bg=getComputedStyle(document.documentElement).getPropertyValue('--bg').trim()||'#0f0f11';
  ctx.fillStyle=bg;ctx.fillRect(ox2,oy2,w,h);
  if(CS.bg==='blank') return;
  const gap=CS.bg==='graph'?28:32;
  ctx.strokeStyle='rgba(128,128,160,.1)';ctx.lineWidth=1;
  const sx=Math.floor(ox2/gap)*gap,sy=Math.floor(oy2/gap)*gap;
  if(CS.bg==='lined'){
    for(let y=sy;y<oy2+h;y+=gap){ctx.beginPath();ctx.moveTo(ox2,y);ctx.lineTo(ox2+w,y);ctx.stroke();}
  } else {
    for(let x=sx;x<ox2+w;x+=gap){ctx.beginPath();ctx.moveTo(x,oy2);ctx.lineTo(x,oy2+h);ctx.stroke();}
    for(let y=sy;y<oy2+h;y+=gap){ctx.beginPath();ctx.moveTo(ox2,y);ctx.lineTo(ox2+w,y);ctx.stroke();}
  }
}

function setCVTool(t,btn){
  CS.tool=t;CS.shape=null;
  CS.selected=null;hideShapePopup();
  document.querySelectorAll('.cvb').forEach(b=>b.classList.remove('on'));
  if(btn) btn.classList.add('on');
  const cv=document.getElementById('cv');
  if(cv) cv.style.cursor=t==='pan'?'grab':t==='select'?'default':t==='eraser'?'cell':'crosshair';
  // Update color row for pen/pencil presets
  updateColorRowForTool(t);
}
function setCVShape(shape,btn){
  CS.shape=shape;CS.tool='shape';
  document.querySelectorAll('.cvb').forEach(b=>b.classList.remove('on'));
  if(btn) btn.classList.add('on');
  const fillBtn=document.getElementById('cvb-fill');
  if(fillBtn) fillBtn.classList.toggle('on',CS.fillShape);
  const cv=document.getElementById('cv');
  if(cv) cv.style.cursor='crosshair';
}
function setCVColor(c,dot){
  CS.color=c;
  document.querySelectorAll('.ccd').forEach(d=>d.classList.remove('on'));
  if(dot) dot.classList.add('on');
  // Save to current tool's preset list
  if(CS.tool==='pen'||CS.tool==='pencil'){
    const key=CS.tool+'Colors';
    if(!CS[key].includes(c)){CS[key].unshift(c);CS[key]=CS[key].slice(0,5);}
    else{CS[key]=CS[key].filter(x=>x!==c);CS[key].unshift(c);}
    // Persist
    try{localStorage.setItem('stn_'+key,JSON.stringify(CS[key]));}catch(e){}
  }
}
function setCVBg(bg,btn){
  CS.bg=bg;
  document.querySelectorAll('.bgtg').forEach(b=>b.classList.remove('on'));
  if(btn) btn.classList.add('on');
  drawCV();
}
function updateColorRowForTool(t){
  const row=document.getElementById('cv-color-row');
  if(!row) return;
  const presets=(t==='pencil'?CS.pencilColors:CS.penColors);
  const base=['#7c6af5','#f87171','#4ade80','#fbbf24','#22d3ee','#f472b6','#fff','#111'];
  const colors=[...new Set([...presets,...base])].slice(0,8);
  row.innerHTML=colors.map(c=>`<div class="ccd${CS.color===c?' on':''}" style="background:${c}" onclick="setCVColor('${c}',this)"></div>`).join('')
    +`<div class="cpw" style="display:inline-flex;align-items:center" title="Custom color"><div class="ccd" style="background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red)"></div><input type="color" onchange="setCVColor(this.value,null)"></div>`;
}

function showPTab(t){
  document.getElementById('cro').style.display=t==='out'?'block':'none';
  document.getElementById('cno').style.display=t==='note'?'block':'none';
  document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('on'));

}
function updateCLang(lang){if(_curPg){_curPg.codeLang=lang;saveA();}}
function runCode(){
  const lang=document.getElementById('cd-lang')?.value;
  const code=document.getElementById('ce')?.value||'';
  const out=document.getElementById('cro');
  if(!out) return;
  out.style.color='var(--gr)';
  if(lang!=='javascript'){out.innerHTML=`<div style="color:var(--t3)">Only JavaScript can run in browser.</div>`;showPTab('out');return;}
  showPTab('out');
  const logs=[];const orig=console.log,origE=console.error,origW=console.warn;
  console.log=(...a)=>{logs.push({t:'log',m:a.map(x=>typeof x==='object'?JSON.stringify(x,null,2):String(x)).join(' ')});orig(...a);};
  console.error=(...a)=>{logs.push({t:'err',m:a.join(' ')});origE(...a);};
  console.warn=(...a)=>{logs.push({t:'warn',m:a.join(' ')});origW(...a);};
  try{const r=eval(code);if(r!==undefined) logs.push({t:'ret',m:'→ '+String(r)});}
  catch(e){logs.push({t:'err',m:'❌ '+e.message});}
  console.log=orig;console.error=origE;console.warn=origW;
  out.innerHTML=logs.map(l=>`<div style="color:${l.t==='err'?'var(--rd)':l.t==='warn'?'var(--yw)':l.t==='ret'?'var(--cy)':'var(--gr)'};margin-bottom:3px;white-space:pre-wrap;word-break:break-word">${esc(l.m)}</div>`).join('')
    ||'<div style="color:var(--t3)">(no output)</div>';
}
function applyPrismOverlay(pg){
  const ce=document.getElementById('ce');

  if(!ce||!over) return;
  const lang=(document.getElementById('cd-lang')?.value||'javascript').replace('c++','cpp').replace('html','markup');
  over.className=`language-${lang}`;
  over.textContent=ce.value;
  if(typeof Prism!=='undefined') Prism.highlightElement(over);
  over.style.display='block';
  ce.style.color='transparent';
  ce.style.caretColor='var(--t)';
}
function hidePrismOverlay(){
  const ce=document.getElementById('ce');
  const over=document.getElementById('ce-overlay');
  if(!ce||!over) return;
  over.style.display='none';
  ce.style.color='';
}

// QUIZ PAGE TYPE
// ═══════════════════════════════════════════
// Format (one quiz per line):
// Q: Question text
// A: Correct Answer
// B: Wrong option
// C: Wrong option
// D: Wrong option
// (blank line separates questions)
// Explanation: optional explanation shown after answer

function openQuiz(pg){
  _curPg=pg;
  document.getElementById('tpl-btn').style.display='none';
  document.getElementById('exp-btn').style.display='none';
  const mode=(pg.quizMode||'edit');
  document.getElementById('con').innerHTML=`<div id="qzw">
    <div class="qz-hdr">
      <input class="qz-tit" value="${esc(pg.name)}" oninput="pgRename(this.value)">
      <div class="qz-modes">
        <button class="qz-mode${mode==='edit'?' on':''}" onclick="setQZMode('edit')">✏️ Edit</button>
        <button class="qz-mode${mode==='play'?' on':''}" onclick="setQZMode('play')">▶ Play</button>
      </div>
    </div>
    <div class="qz-syntax">
      <strong>Format:</strong> &nbsp;
      <code>Q: Question</code> &nbsp;
      <code>A: Correct answer</code> &nbsp;
      <code>B: Wrong</code> &nbsp;
      <code>C: Wrong</code> &nbsp;
      <code>D: Wrong</code> &nbsp;
      (blank line = new question) &nbsp;
      <code>Explanation: …</code> optional
    </div>
    <div id="qz-mode-body" style="flex:1;overflow:hidden;display:flex;flex-direction:column"></div>
  </div>`;
  if(mode==='edit') renderQZEdit(pg);
  else renderQZPlay(pg);
}

function setQZMode(mode){
  if(!_curPg) return;
  _curPg.quizMode=mode;
  saveA();
  openQuiz(_curPg);
}

function renderQZEdit(pg){
  const body=document.getElementById('qz-mode-body');
  body.innerHTML=`<textarea id="qz-txt" placeholder="Q: What is 2+2?
A: 4
B: 3
C: 5
D: 6

Q: What planet is closest to the Sun?
A: Mercury
B: Venus
C: Earth
D: Mars
Explanation: Mercury is the innermost planet in the Solar System.
">${esc(pg.quizText||'')}</textarea>`;
  document.getElementById('qz-txt').addEventListener('input',function(){
    pg.quizText=this.value;clearTimeout(_asTimer);_asTimer=setTimeout(saveA,600);
  });
}

function parseQuiz(text){
  const questions=[];
  const blocks=(text||'').split(/\n\s*\n/);
  blocks.forEach(block=>{
    const lines=block.trim().split('\n');
    const q={q:'',options:[],correct:'',expl:''};
    lines.forEach(line=>{
      const m=line.match(/^([A-Da-d]|Q|Explanation):\s*(.+)/i);
      if(!m) return;
      const key=m[1].toUpperCase();
      const val=m[2].trim();
      if(key==='Q') q.q=val;
      else if(key==='A'){q.options.push({letter:'A',text:val});q.correct='A';}
      else if(key==='B') q.options.push({letter:'B',text:val});
      else if(key==='C') q.options.push({letter:'C',text:val});
      else if(key==='D') q.options.push({letter:'D',text:val});
      else if(key==='EXPLANATION') q.expl=val;
    });
    // Shuffle options for play mode (keep A as correct before shuffle)
    if(q.q&&q.options.length>=2) questions.push(q);
  });
  return questions;
}

function renderQZPlay(pg){
  const qs=parseQuiz(pg.quizText);
  if(!qs.length){
    document.getElementById('qz-mode-body').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;flex:1;flex-direction:column;gap:10px;color:var(--t3)">
      <div style="font-size:32px">❓</div><p>No questions yet.</p>
      <button class="qz-mode on" onclick="setQZMode('edit')">✏️ Add Questions</button></div>`;
    return;
  }
  // Shuffle options per question
  const shuffled=qs.map(q=>{
    const opts=[...q.options];
    for(let i=opts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[opts[i],opts[j]]=[opts[j],opts[i]];}
    return {...q,options:opts};
  });
  pg._qsPlay=shuffled;pg._qIdx=0;pg._qScore=0;pg._qResults=[];
  renderQZCard(pg);
}

function renderQZCard(pg){
  const body=document.getElementById('qz-mode-body');
  const qs=pg._qsPlay;
  if(!qs){renderQZPlay(pg);return;}
  if(pg._qIdx>=qs.length){renderQZFinish(pg);return;}
  const q=qs[pg._qIdx];
  const letters=['A','B','C','D'];
  body.innerHTML=`<div id="qz-play" style="display:flex;flex-direction:column;align-items:center;overflow-y:auto;padding:20px">
    <div class="qprog">${qs.map((_,i)=>`<div class="qpdot${i<pg._qIdx?pg._qResults[i]?'done':'wrong-dot':i===pg._qIdx?' cur':''}"></div>`).join('')}</div>
    <div class="qscore">Question ${pg._qIdx+1} of ${qs.length} &nbsp;·&nbsp; Score: ${pg._qScore}</div>
    <div class="qcard">
      <div class="qcard-n">${q.q?'':'Question '+(pg._qIdx+1)}</div>
      <div class="qcard-q">${esc(q.q)}</div>
      <div class="qopts" id="qopts">
        ${q.options.map((o,i)=>`<div class="qopt" data-letter="${o.letter}" onclick="answerQ('${o.letter}','${q.correct}',${pg._qIdx})">
          <div class="qopt-letter">${letters[i]}</div>
          <span>${esc(o.text)}</span>
        </div>`).join('')}
      </div>
      ${q.expl?`<div id="qexpl" style="display:none;font-size:13px;color:var(--t3);margin-top:14px;font-style:italic;text-align:center">${esc(q.expl)}</div>`:''}
      <button class="qnext" id="qnext" style="display:none" onclick="nextQ()">Next →</button>
    </div>
  </div>`;
}

function answerQ(chosen,correct,idx){
  const opts=document.querySelectorAll('.qopt');
  opts.forEach(o=>{
    o.classList.add('answered');
    const letter=o.dataset.letter;
    if(letter===correct) o.classList.add('reveal-correct');
    if(letter===chosen&&chosen!==correct) o.classList.add('wrong');
    if(letter===chosen&&chosen===correct) o.classList.add('correct');
  });
  const correct_bool=(chosen===correct);
  if(correct_bool) _curPg._qScore++;
  _curPg._qResults[idx]=correct_bool;
  const expl=document.getElementById('qexpl');
  if(expl) expl.style.display='block';
  document.getElementById('qnext').style.display='inline-block';
}
function nextQ(){
  _curPg._qIdx++;
  renderQZCard(_curPg);
}
function renderQZFinish(pg){
  const body=document.getElementById('qz-mode-body');
  const pct=Math.round(pg._qScore/pg._qsPlay.length*100);
  const emoji=pct>=80?'🏆':pct>=60?'👍':pct>=40?'📚':'💪';
  body.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;flex:1;overflow-y:auto">
    <div class="qfinish">
      <div style="font-size:56px;margin-bottom:10px">${emoji}</div>
      <h2>${pg._qScore} / ${pg._qsPlay.length}</h2>
      <p style="font-size:16px;color:var(--t2);margin:6px 0 20px">${pct}% correct</p>
      ${pct<80?`<p style="font-size:13px;color:var(--t3);margin-bottom:18px">Keep practicing! You've got this 💪</p>`:''}
      <div style="display:flex;gap:9px;justify-content:center">
        <button class="qnext" onclick="renderQZPlay(_curPg)">🔄 Retry</button>
        <button class="qnext" style="background:var(--bg4);color:var(--t2)" onclick="setQZMode('edit')">✏️ Edit</button>
      </div>
    </div>
  </div>`;
}

function doAddTask(nbId){

function getAllTasks(nbId){
  if(nbId) return A.tasks[nbId]||[];
  return Object.values(A.tasks).flat();
}

let _tkDragId=null,_tkDragNb=null;
function renderTkList(nbId){
  const body=document.getElementById('tk-content');
  const tasks=getAllTasks(nbId);
  if(!tasks.length){
    body.innerHTML=`<div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--t3);padding:20px">
      <div style="font-size:32px">✅</div><p>No tasks yet</p>
      <button class="add-tk" onclick="showAddTaskModal('${nbId||''}')" style="width:auto">+ Add Task</button></div>`;
    return;
  }
  const now=new Date();now.setHours(0,0,0,0);
  const today=now.toISOString().slice(0,10);
  const groups={overdue:[],today:[],upcoming:[],someday:[]};
  tasks.forEach(t=>{
    if(!t.dueDate) groups.someday.push(t);
    else if(t.dueDate<today) groups.overdue.push(t);
    else if(t.dueDate===today) groups.today.push(t);
    else groups.upcoming.push(t);
  });
  let html='<div class="tk-body">';
  const groupLabels={overdue:'⚠️ Overdue',today:'📅 Today',upcoming:'🗓 Upcoming',someday:'📌 No Date'};
  Object.entries(groups).forEach(([key,tks])=>{
    if(!tks.length) return;
    html+=`<div class="tkg"><div class="tkg-lbl">${groupLabels[key]}</div>`;
    tks.forEach(t=>{
      const overdue=t.dueDate&&t.dueDate<today&&!t.done;
      html+=`<div class="tki${t.done?' done':''}" id="tki_${t.id}" draggable="true"
        ondragstart="_tkDragId='${t.id}';_tkDragNb='${nbId||''}';event.currentTarget.style.opacity='.45'"
        ondragend="event.currentTarget.style.opacity='';_tkDragId=null"
        ondragover="event.preventDefault();event.currentTarget.classList.add('tk-drop-over')"
        ondragleave="event.currentTarget.classList.remove('tk-drop-over')"
        ondrop="event.currentTarget.classList.remove('tk-drop-over');tkReorder('${t.id}','${nbId||''}')">
        <span class="tk-grip">⠿</span>
        <input type="checkbox" class="tcbx" ${t.done?'checked':''} onchange="toggleTk('${t.id}','${nbId||''}',this)">
        <div class="tcon">
          <span class="ttxt" contenteditable="true" onblur="renameTk('${t.id}','${nbId||''}',this.textContent)">${esc(t.name)}</span>
          <div class="tmeta">
            ${t.dueDate?`<span class="tbadge ${overdue?'ov':'ok'}">${t.dueDate}</span>`:''}
            ${t.pageLink?`<span class="tplink" onclick="openPage('${t.pageLinkNb||''}','${t.pageLink}')">↗ ${esc((A.pages[t.pageLinkNb]||[]).find(p=>p.id===t.pageLink)?.name||'page')}</span>`:''}
          </div>
        </div>
        <button class="ib" style="font-size:11px;color:var(--t3)" onclick="deleteTk('${t.id}','${nbId||''}')">✕</button>
      </div>`;
    });
    html+='</div>';
  });
  html+=`<button class="add-tk" onclick="showAddTaskModal('${nbId||''}')">+ Add Task</button></div>`;
  body.innerHTML=html;
}

function toggleTk(id,nbId,el){
  const task=findTask(id,nbId);
  if(task) task.done=el.checked;
  saveA();renderTkList(nbId);
}
function renameTk(id,nbId,name){
  const task=findTask(id,nbId);
  if(task) task.name=name.trim();
  saveA();
}
function deleteTk(id,nbId){
  const key=nbId||'global';
  if(A.tasks[key]) A.tasks[key]=A.tasks[key].filter(t=>t.id!==id);
  if(!nbId) Object.keys(A.tasks).forEach(k=>{A.tasks[k]=(A.tasks[k]||[]).filter(t=>t.id!==id);});
  saveA();renderTkList(nbId);
}
function findTask(id,nbId){
  const key=nbId||'global';
  let t=(A.tasks[key]||[]).find(x=>x.id===id);
  if(!t) t=Object.values(A.tasks).flat().find(x=>x.id===id);
  return t;
}
function tkReorder(targetId,nbId){
  if(!_tkDragId||_tkDragId===targetId) return;
  const key=nbId||'global';
  const arr=A.tasks[key];
  if(!arr) return;
  const fi=arr.findIndex(t=>t.id===_tkDragId);
  const ti=arr.findIndex(t=>t.id===targetId);
  if(fi<0||ti<0) return;
  const [item]=arr.splice(fi,1);
  arr.splice(ti,0,item);
  saveA();renderTkList(nbId);
}

// ── TASK CALENDAR ──
function renderTkCal(nbId){
  const body=document.getElementById('tk-content');
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const fullMonths=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const days=['Su','Mo','Tu','We','Th','Fr','Sa'];
  const {y,m}=_tkCal;
  const first=new Date(y,m,1).getDay();
  const total=new Date(y,m+1,0).getDate();
  const tasks=getAllTasks(nbId);
  const tasksByDate={};
  tasks.forEach(t=>{if(t.dueDate){if(!tasksByDate[t.dueDate]) tasksByDate[t.dueDate]=[];tasksByDate[t.dueDate].push(t);}});
  const today=new Date().toISOString().slice(0,10);
  let html=`<div id="tkcal" style="overflow-y:auto;padding:10px 16px">
    <div class="tcnav">
      <button onclick="_tkCal.m--;if(_tkCal.m<0){_tkCal.m=11;_tkCal.y--}renderTkCal('${nbId||''}')">‹</button>
      <span class="tctit">${fullMonths[m]} ${y}</span>
      <button onclick="_tkCal.m++;if(_tkCal.m>11){_tkCal.m=0;_tkCal.y++}renderTkCal('${nbId||''}')">›</button>
      <button onclick="showAddTaskModal('${nbId||''}')">+ Task</button>
    </div>
    <div class="tcgrid">${days.map(d=>`<div class="tcdl">${d}</div>`).join('')}`;
  for(let i=0;i<first;i++) html+=`<div class="tcd emp-d"></div>`;
  for(let d=1;d<=total;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dtasks=tasksByDate[ds]||[];
    const isToday=ds===today;
    html+=`<div class="tcd${isToday?' tod':''}">
      <div class="tcdn">${d}</div>
      ${dtasks.slice(0,3).map(t=>`<div class="tcc${t.done?' done':''}" title="${esc(t.name)}" onclick="quickTkEdit('${t.id}','${nbId||''}')">${esc(t.name.slice(0,12))}${t.name.length>12?'…':''}</div>`).join('')}
      ${dtasks.length>3?`<div style="font-size:8px;color:var(--t3)">+${dtasks.length-3}</div>`:''}
    </div>`;
  }
  html+='</div></div>';
  body.innerHTML=html;
}

function quickTkEdit(id,nbId){
  const t=findTask(id,nbId);
  if(!t) return;
  showModal(`<h2>Edit Task</h2>
    <div class="task-modal-form">
      <input class="fi" id="etk-name" value="${esc(t.name)}">
      <div class="date-row"><label>Due:</label><input class="fi" id="etk-date" type="date" value="${t.dueDate||''}"></div>
    </div>
    <div class="mbtns">
      <button class="bs dng" onclick="deleteTk('${id}','${nbId}');closeModal()">Delete</button>
      <button class="bs" onclick="closeModal()">Cancel</button>
      <button class="bp" onclick="saveQuickTk('${id}','${nbId}')">Save</button>
    </div>`);
}
function saveQuickTk(id,nbId){
  const t=findTask(id,nbId);
  if(t){t.name=document.getElementById('etk-name').value.trim();t.dueDate=document.getElementById('etk-date').value||'';}
  saveA();closeModal();renderTasks(nbId||'');
}

// ── BG colour map → CSS value (auto theme-aware) ──
function wBgCss(w){
  if(w.bgImage) return `url(${w.bgImage}) center/cover no-repeat`;
  const map={
    accent:'var(--ac)',green:'var(--gr)',red:'var(--rd)',
    yellow:'var(--yw)',cyan:'var(--cy)',pink:'var(--pk)',
  };
  if(w.bg&&map[w.bg]) return map[w.bg];
  if(w.bg&&w.bg.startsWith('#')) return w.bg;
  return null;
}

function renderHome(){
  const con=document.getElementById('con');
  if(!con) return;
  con.innerHTML=`<div id="home-wrap">
    <div id="home-widgets"></div>
    <button class="home-add-btn" onclick="showAddWidget()" title="Add widget">＋</button>
  </div>`;
  renderWidgets();
  // right-click on empty canvas = add widget
  document.getElementById('home-wrap').addEventListener('contextmenu',e=>{
    if(e.target.id==='home-wrap'||e.target.id==='home-widgets'){
      e.preventDefault();
      hwCtxMenu(e,null);
    }
  });
}

function renderWidgets(){
  const wrap=document.getElementById('home-widgets');
  if(!wrap) return;
  wrap.innerHTML='';
  (A.homeWidgets||[]).forEach(w=>buildWidgetEl(w,wrap));
  wireWidgetInputs();
  updateClocks();
}

function buildWidgetEl(w,wrap){
  const el=document.createElement('div');
  const bgVal=wBgCss(w);
  const styleClass='hw-s-'+(w.style||'default');
  el.className='hw '+styleClass;
  el.id='hw-'+w.id;
  const px=(w.x-1)*(WIDGET_CELL+WIDGET_GAP);
  const py=(w.y-1)*(WIDGET_CELL+WIDGET_GAP);
  const pw=w.w*WIDGET_CELL+(w.w-1)*WIDGET_GAP;
  const ph=w.h*WIDGET_CELL+(w.h-1)*WIDGET_GAP;
  let bgStyle=bgVal?`background:${bgVal};`:'';
  // Adjust text color for accent/colored bg
  const lightBg=w.bg&&['accent','green','cyan','pink'].includes(w.bg)||w.bg?.startsWith('#');
  if(bgVal) bgStyle+='--hw-t:#fff;--hw-t2:rgba(255,255,255,.75);--hw-t3:rgba(255,255,255,.45);--hw-bd:rgba(255,255,255,.18);';
  el.style.cssText=`left:${px}px;top:${py}px;width:${pw}px;height:${ph}px;${bgStyle}`;
  const label=w.label||widgetDefaultLabel(w.type);
  el.innerHTML=`
    <div class="hw-hdr">
      <span class="hw-title" id="hwlbl-${w.id}" onclick="startRenameWidget('${w.id}')">${esc(label)}</span>
      <span class="hw-actions">
        <button class="hw-btn" onclick="hwCtxMenu(event,'${w.id}')" title="Options">⋯</button>
      </span>
    </div>
    <div class="hw-body" id="hwb-${w.id}">${renderWidgetBody(w)}</div>
    <div class="hw-resize" onpointerdown="wResizeStart(event,'${w.id}')"></div>`;
  el.querySelector('.hw-hdr').addEventListener('pointerdown',e=>{
    if(e.target.closest('button')||e.target.id?.startsWith('hwlbl')) return;
    wDragStart(e,w.id,el);
  });
  el.addEventListener('contextmenu',e=>{e.preventDefault();hwCtxMenu(e,w.id);});
  wrap.appendChild(el);
}

function widgetDefaultLabel(type){
  const cat=WIDGET_CATALOG.find(c=>c.type===type);
  return cat?cat.icon+' '+cat.name:type;
}

// ── RIGHT-CLICK CONTEXT MENU ──
function hwCtxMenu(e,wid){
  e.stopPropagation?.();
  hideCtx?.();
  const items=wid?[
    {label:'✏️ Rename',    fn:`startRenameWidget('${wid}')`},
    {label:'🎨 Style',     fn:`showWidgetStylePanel('${wid}')`},
    {label:'🖼 Background', fn:`showWidgetBgPanel('${wid}')`},
    {label:'📌 Duplicate', fn:`duplicateWidget('${wid}')`},
    {sep:true},
    {label:'🗑 Remove',    fn:`removeWidget('${wid}')`,danger:true},
  ]:[
    {label:'＋ Add Widget', fn:`showAddWidget()`},
    {label:'📐 Reset Layout', fn:`resetHomeLayout()`},
  ];
  const menu=document.createElement('div');
  menu.className='hw-ctx';
  menu.id='hw-ctx-menu';
  menu.style.cssText=`left:${Math.min(e.clientX,window.innerWidth-160)}px;top:${Math.min(e.clientY,window.innerHeight-200)}px`;
  menu.innerHTML=items.map(it=>it.sep?'<div class="hw-ctx-sep"></div>'
    :`<div class="hw-ctx-item${it.danger?' dng':''}" onclick="${it.fn};removeHwCtx()">${it.label}</div>`).join('');
  document.body.appendChild(menu);
  setTimeout(()=>document.addEventListener('click',removeHwCtx,{once:true}),10);
}

function setWidgetBgImage(wid,input){
  const file=input.files[0];if(!file) return;
  const r=new FileReader();
  r.onload=e=>{
    const w=A.homeWidgets.find(x=>x.id===wid);
    if(w){w.bgImage=e.target.result;w.bg=null;saveA();renderWidgets();}
  };

// ── RENAME ──
function startRenameWidget(wid){
  const w=A.homeWidgets.find(x=>x.id===wid);if(!w) return;
  const el=document.getElementById('hwlbl-'+wid);if(!el) return;
  const old=el.textContent;
  el.contentEditable='true';el.style.outline='1px solid var(--ac)';el.focus();
  const sel=window.getSelection();sel.selectAllChildren(el);
  function done(){
    el.contentEditable='false';el.style.outline='';
    const nv=el.textContent.trim()||old;
    el.textContent=nv; w.label=nv; saveA();
  }
  el.addEventListener('blur',done,{once:true});
  el.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();el.blur();}});
}

// ── DUPLICATE ──
function duplicateWidget(wid){
  const w=A.homeWidgets.find(x=>x.id===wid);if(!w) return;
  const nw=JSON.parse(JSON.stringify(w));
  nw.id='w'+Date.now();nw.x=w.x+1;nw.y=w.y+1;
  A.homeWidgets.push(nw);saveA();renderWidgets();
}

// ── RESET LAYOUT ──
function resetHomeLayout(){
  if(!confirm('Reset widget layout?')) return;
  A.homeWidgets=getDefaultWidgets();saveA();renderWidgets();
}

// ════════ WIDGET BODY RENDERERS ════════
function renderWidgetBody(w){
  try{
    switch(w.type){
      case 'clock':      return wClock(w);
      case 'countdown':  return wCountdown(w);
      case 'tasks':      return wTasks(w);
      case 'nbtasks':    return wNbTasks(w);
      case 'alltasks':   return wAllTasks(w);
      case 'quicknote':  return wQuickNote(w);
      case 'richsnip':   return wRichSnip(w);
      case 'recentpages':return wRecentPages(w);
      case 'bookmarks':  return wBookmarks(w);
      case 'search':     return wSearch(w);
      case 'calendar':   return wCalendar(w);
      case 'journal':    return wJournalWidget(w);
      case 'habittrack': return wHabits(w);
      case 'image':      return wImage(w);
      case 'drawing':    return wDrawing(w);
      case 'embed':      return wEmbed(w);
      case 'progress':   return wProgress(w);
      case 'weather':    return wWeather(w);
      case 'quote':      return wQuote(w);
      default: return `<div style="color:var(--t3);font-size:12px;padding:8px">${w.type}</div>`;
    }
  }catch(err){return `<div style="color:var(--rd);font-size:11px;padding:8px">Error: ${esc(err.message)}</div>`;}
}

// Clock
function wClock(w){
  return `<div class="hw-clock" id="hw-clock-${w.id}"></div>`;
}

// Countdown
function wCountdown(w){
  const target=w.data.target||'';
  const label=w.data.dlabel||'Deadline';
  let body='';
  if(target){
    const ms=new Date(target)-new Date();
    const d=Math.max(0,Math.floor(ms/864e5));
    const h=Math.max(0,Math.floor((ms%864e5)/36e5));
    body=`<div style="text-align:center;padding:8px">
      <div style="font-size:28px;font-weight:700;color:var(--hw-t,var(--t))">${d}<span style="font-size:14px">d</span> ${h}<span style="font-size:14px">h</span></div>
      <div style="font-size:11px;color:var(--hw-t3,var(--t3))">${esc(label)}</div>
    </div>`;
  } else {
    body=`<div style="padding:8px;font-size:12px;color:var(--hw-t3,var(--t3))">
      <input class="hw-fi" placeholder="Label" value="${esc(w.data.dlabel||'')}" oninput="hwSaveData('${w.id}','dlabel',this.value)" style="margin-bottom:4px">
      <input class="hw-fi" type="date" value="${w.data.target||''}" oninput="hwSaveData('${w.id}','target',this.value);renderWidgets()">
    </div>`;
  }
  return body;
}

// Today tasks widget
function wTasks(w){
  const today=new Date().toISOString().slice(0,10);
  const all=Object.values(A.tasks).flat();
  const due=all.filter(t=>!t.done&&(!t.dueDate||t.dueDate<=today));
  if(!due.length) return `<div class="hw-empty">No tasks due today 🎉</div>`;
  return `<div class="hw-tasklist" id="hwtl-${w.id}">
    ${due.slice(0,10).map(t=>`<div class="hw-task" draggable="true">
      <input type="checkbox" ${t.done?'checked':''} onchange="hwToggleTask('${t.id}',this,'${w.id}')">
      <span class="hw-tlabel">${esc(t.text||t.name||'')}</span>
      <button class="hw-del" onclick="hwDeleteTask('${t.id}','${w.id}')">×</button>
    </div>`).join('')}
    <button class="hw-add-task" onclick="showAddTaskModal('')">+ Add</button>
  </div>`;
}

// Notebook tasks widget
function wNbTasks(w){
  const nbId=w.data.nbId||'';
  const nb=A.notebooks.find(n=>n.id===nbId);
  if(!nbId||!nb) return `<div style="padding:8px;font-size:12px;color:var(--hw-t3,var(--t3))">
    <div style="margin-bottom:6px">Choose notebook:</div>
    <select class="hw-fi" onchange="hwSaveData('${w.id}','nbId',this.value);renderWidgets()">
      <option value="">— pick one —</option>
      ${A.notebooks.map(n=>`<option value="${n.id}">${n.icon} ${esc(n.name)}</option>`).join('')}
    </select></div>`;
  const tasks=(A.tasks[nbId]||[]);
  return `<div>
    <div style="font-size:11px;color:var(--hw-t3,var(--t3));padding:2px 6px 4px">${nb.icon} ${esc(nb.name)}</div>
    <div class="hw-tasklist" id="hwtl-${w.id}">
      ${tasks.slice(0,10).map(t=>`<div class="hw-task">
        <input type="checkbox" ${t.done?'checked':''} onchange="hwToggleTask('${t.id}',this,'${w.id}')">
        <span class="hw-tlabel${t.done?' done':''}">${esc(t.text||t.name||'')}</span>
        <button class="hw-del" onclick="hwDeleteTask('${t.id}','${w.id}')">×</button>
      </div>`).join('')||'<div class="hw-empty">No tasks</div>'}
    </div>
    <button class="hw-add-task" onclick="showAddTaskModal('${nbId}')">+ Add</button>
  </div>`;
}

// All tasks across notebooks
function wAllTasks(w){
  const nbs=A.notebooks.filter(nb=>(A.tasks[nb.id]||[]).length);
  const global=A.tasks.global||[];
  if(!nbs.length&&!global.length) return `<div class="hw-empty">No tasks yet</div>`;
  let html='<div style="overflow-y:auto;height:100%;padding:2px">';
  if(global.length){
    html+=`<div class="hw-nb-group"><div class="hw-nb-grp-hdr" onclick="this.nextElementSibling.classList.toggle('hide')">🌐 Global</div>
    <div class="hw-nb-grp-body">${global.slice(0,8).map(t=>`<div class="hw-task">
      <input type="checkbox" ${t.done?'checked':''} onchange="hwToggleTask('${t.id}',this,'')">
      <span class="hw-tlabel${t.done?' done':''}">${esc(t.text||t.name||'')}</span>
    </div>`).join('')}</div></div>`;
  }
  nbs.forEach(nb=>{
    const tasks=(A.tasks[nb.id]||[]).slice(0,8);
    html+=`<div class="hw-nb-group"><div class="hw-nb-grp-hdr" onclick="this.nextElementSibling.classList.toggle('hide')">${nb.icon} ${esc(nb.name)} <span class="hw-badge">${tasks.length}</span></div>

// ── DRAG & RESIZE ──
function wDragStart(e,id,el){
  e.preventDefault();
  const rect=el.getBoundingClientRect();
  const offX=e.clientX-rect.left,offY=e.clientY-rect.top;
  el.style.opacity='.75';el.style.zIndex='999';el.style.transition='none';
  function onMove(ev){
    const wrap=document.getElementById('home-widgets');
    const wr=wrap.getBoundingClientRect();
    el.style.left=Math.max(0,ev.clientX-wr.left-offX)+'px';
    el.style.top=Math.max(0,ev.clientY-wr.top-offY)+'px';
  }
  function onUp(ev){
    el.style.opacity='';el.style.zIndex='';el.style.transition='';
    const w=A.homeWidgets.find(w=>w.id===id);
    if(w){
      const wrap=document.getElementById('home-widgets');
      const wr=wrap.getBoundingClientRect();
      w.x=Math.max(1,Math.round((ev.clientX-wr.left-offX)/(WIDGET_CELL+WIDGET_GAP))+1);
      w.y=Math.max(1,Math.round((ev.clientY-wr.top-offY)/(WIDGET_CELL+WIDGET_GAP))+1);
      saveA();renderWidgets();
    }
    document.removeEventListener('pointermove',onMove);
    document.removeEventListener('pointerup',onUp);
  }
  document.addEventListener('pointermove',onMove);
  document.addEventListener('pointerup',onUp);
}

function wResizeStart(e,id){
  e.preventDefault();e.stopPropagation();
  const sx=e.clientX,sy=e.clientY;
  const w=A.homeWidgets.find(w=>w.id===id);if(!w) return;
  const sw=w.w,sh=w.h;
  function onMove(ev){
    const dx=ev.clientX-sx,dy=ev.clientY-sy;
    w.w=Math.max(2,sw+Math.round(dx/(WIDGET_CELL+WIDGET_GAP)));
    w.h=Math.max(1,sh+Math.round(dy/(WIDGET_CELL+WIDGET_GAP)));
    const el=document.getElementById('hw-'+id);
    if(el){
      el.style.width=(w.w*WIDGET_CELL+(w.w-1)*WIDGET_GAP)+'px';
      el.style.height=(w.h*WIDGET_CELL+(w.h-1)*WIDGET_GAP)+'px';
    }
  }
  function onUp(){saveA();renderWidgets();
    document.removeEventListener('pointermove',onMove);
    document.removeEventListener('pointerup',onUp);
  }
  document.addEventListener('pointermove',onMove);
  document.addEventListener('pointerup',onUp);
}

let _jCal={y:new Date().getFullYear(),m:new Date().getMonth()};

function renderJournal(){
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const days=['Su','Mo','Tu','We','Th','Fr','Sa'];
  const {y,m}=_jCal;
  const first=new Date(y,m,1).getDay();
  const total=new Date(y,m+1,0).getDate();
  const today=new Date().toISOString().slice(0,10);
  let calHtml=days.map(d=>`<div class="jcdl">${d}</div>`).join('');
  for(let i=0;i<first;i++) calHtml+=`<div class="jcd emp"></div>`;
  for(let d=1;d<=total;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=ds===today,isSel=ds===_jDate,hasEntry=!!A.journalEntries[ds]?.content;
    calHtml+=`<div class="jcd${isToday?' tod':''}${isSel&&!isToday?' sel':''}${hasEntry?' he':''}" onclick="selJDay('${ds}')">${d}</div>`;
  }
  // List of recent entries
  const entries=Object.entries(A.journalEntries).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,12);
  const listHtml=entries.map(([ds,e])=>`<div class="jditem${_jDate===ds?' on':''}" onclick="selJDay('${ds}')">
    <div class="jddate">${ds}</div>
    <div class="jdprev">${e.mood||''} ${(e.content||'').slice(0,38)}</div>
  </div>`).join('');
  document.getElementById('con').innerHTML=`<div id="jw">
    <div id="jleft">
      <div class="jcal">
        <div class="jcnav">
          <button onclick="_jCal.m--;if(_jCal.m<0){_jCal.m=11;_jCal.y--}renderJournal()">‹</button>
          <span class="jcmon">${months[m]} ${y}</span>
          <button onclick="_jCal.m++;if(_jCal.m>11){_jCal.m=0;_jCal.y++}renderJournal()">›</button>
        </div>

// ── ALGEBRA ENGINE ──
function solveEq(eq,v='x'){
  eq=eq.replace(/\s/g,'');
  const steps=[];
  // Check factored form: (x+a)(x+b)=0
  const fm=eq.match(/^\(([^)]+)\)\(([^)]+)\)=0$/);
  if(fm){
    const r1=solveLinear(fm[1]+'=0',v);
    const r2=solveLinear(fm[2]+'=0',v);
    steps.push({desc:'Factored form',eq:eq});
    steps.push({desc:'Factor 1',eq:fm[1]+'=0 → '+v+'='+r1});
    steps.push({desc:'Factor 2',eq:fm[2]+'=0 → '+v+'='+r2});
    return {steps,answer:v+'='+r1+' or '+v+'='+r2};
  }
  const parts=eq.split('=');
  if(parts.length!==2) throw new Error('Equation must contain exactly one "="');
  let lhs=parts[0],rhs=parts[1];
  steps.push({desc:'Original',eq:lhs+'='+rhs});
  // Move all to left: lhs - rhs = 0
  const combined=lhs+'-('+rhs+')';
  const expanded=expand(combined);
  if(expanded!==combined) steps.push({desc:'Expand',eq:expanded+'=0'});
  const {coeffs,rem}=collectTerms(expanded,v);
  const a=coeffs[2]||0,b=coeffs[1]||0,c=(coeffs[0]||0)+rem;
  if(a!==0){
    // Quadratic
    steps.push({desc:'Standard form',eq:`${fmtCoeff(a)}${v}²${fmtCoeffSign(b)}${v}${fmtSign(c)}=0`});
    const disc=b*b-4*a*c;
    steps.push({desc:'Discriminant',eq:`Δ = ${b}²-4·${a}·${c} = ${disc}`});
    if(disc<0) throw new Error('No real solutions (discriminant < 0)');
    if(disc===0){
      const ans=round(-b/(2*a));
      steps.push({desc:'Double root',eq:`${v} = ${-b}/(2·${a}) = ${ans}`});
      return {steps,answer:String(ans)};
    }
    const s1=round((-b+Math.sqrt(disc))/(2*a));
    const s2=round((-b-Math.sqrt(disc))/(2*a));
    steps.push({desc:'Quadratic formula',eq:`${v} = (${-b} ± √${disc}) / ${2*a}`});
    steps.push({desc:'Solutions',eq:`${v} = ${s1} or ${v} = ${s2}`});
    return {steps,answer:`${s1} or ${s2}`};
  }
  if(b!==0){
    // Linear
    if(c!==0){
      steps.push({desc:'Move constant',eq:`${fmtCoeff(b)}${v} = ${-c}`});
      const ans=round(-c/b);
      steps.push({desc:'Divide both sides by '+b,eq:`${v} = ${-c}/${b} = ${ans}`});
      return {steps,answer:String(ans)};
    }
    steps.push({desc:'Trivial',eq:`${v} = 0`});
    return {steps,answer:'0'};
  }
  throw new Error('No variable found or equation is an identity');
}

function expand(expr){
  // Handle -(…) by distributing minus
  let s=expr.replace(/\-\(([^)]+)\)/g,(m,inner)=>{
    return inner.replace(/([+-]?\d*\.?\d*[a-z²^]?[a-z]?)/g,t=>{
      if(!t) return '';
      if(t.startsWith('-')) return '+'+t.slice(1);
      if(t.startsWith('+')) return '-'+t.slice(1);
      return '-'+t;
    });
  });
  return s.replace(/\+\+/g,'+').replace(/\+-/g,'-').replace(/--/g,'+');
}

function collectTerms(expr,v){
  // Returns {coeffs:[const,linear,quad], rem}
  const c=[0,0,0];
  const tokens=expr.match(/[+-]?[^+-]+/g)||[];
  tokens.forEach(tok=>{
    tok=tok.trim();
    if(!tok) return;
    if(tok.includes(v+'²')||tok.includes(v+'^2')||tok.includes(v+'2')){
      const n=parseFloat(tok.replace(v+'²','').replace(v+'^2','').replace(v+'2','').replace(v,''))||1;
      c[2]+=isNaN(n)?1:n;
    } else if(tok.includes(v)){
      const nstr=tok.replace(v,'').trim()||'1';
      const n=parseFloat(nstr);
      c[1]+=isNaN(n)?(nstr==='-'?-1:1):n;
    } else {
      const n=parseFloat(tok);
      if(!isNaN(n)) c[0]+=n;
    }
  });
  return {coeffs:c,rem:0};
}

function solveLinear(eq,v){
  const parts=eq.split('=');
  const lhs=parts[0],rhs=parts[1]||'0';
  const combined=lhs+'-('+rhs+')';
  const {coeffs}=collectTerms(expand(combined),v);
  const b=coeffs[1]||0,c=coeffs[0]||0;
  if(b===0) return '?';
  return String(round(-c/b));
}

function fmtCoeff(n){return n===1?'':(n===-1?'-':String(n));}
function fmtCoeffSign(n){if(n===0) return '';return n>0?'+'+fmtCoeff(n):fmtCoeff(n);}
function fmtSign(n){if(n===0) return '';return n>0?'+'+n:String(n);}
function round(n,d=6){return parseFloat(n.toFixed(d));}

             ['## space','Heading 2'],['> space','Blockquote'],['--- space','Divider']
          ].map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bd);font-size:12px"><span style="color:var(--t)">${v}</span><kbd style="background:var(--bg3);border:1px solid var(--bd2);border-radius:4px;padding:1px 5px;font-size:10px;font-family:'DM Mono',monospace;color:var(--t2)">${k}</kbd></div>`).join('')}
        </div>
      </div>
      <!-- Danger zone -->
      <div class="set-sec">
        <h3 style="color:var(--rd)">⚠️ Danger Zone</h3>
        <div class="set-row">
          <div class="set-rl"><div class="slbl">Clear all data</div><div class="sdesc">Permanently delete all notebooks, pages, and journal entries</div></div>
          <button class="sbtn dng" onclick="clearAll()">Clear All</button>
        </div>
      </div>
    </div>
  </div>`;
}

function setTheme(id){A.settings.theme=id;applySettings();saveA();openSettings();}
function setFS(n){A.settings.fontSize=n;applySettings();saveA();openSettings();}
function toggleSetting(key,val){A.settings[key]=val;saveA();}
function clearAll(){
  if(!confirm('Delete ALL data? This cannot be undone.')) return;
  A.notebooks=[];A.pages={};A.tasks={};A.journalEntries={};A.trash=[];A.tags={};A.pageTags={};A.favorites={pages:[],notebooks:[]};
  A.activeNotebook=null;A.activePage=null;A.activeView=null;
  saveA();renderSB();showWelcome();openSettings();
  toast('All data cleared');
}

// ═══════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeModal();
  if((e.ctrlKey||e.metaKey)&&e.key==='\\'){e.preventDefault();toggleSB();}
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveFile();}
});

// ── Reliable autosave listeners ──
// Save before tab close / refresh
window.addEventListener('beforeunload',()=>saveA());
// Save when tab becomes hidden (switch tabs, minimize, phone lock screen)
document.addEventListener('visibilitychange',()=>{ if(document.hidden) saveA(); });
// Save when window loses focus
window.addEventListener('blur',()=>saveA());
// Periodic save every 30s as last resort
setInterval(saveA, 30000);

// ═══════════════════════════════════════════
// NOTEBOOK TASKS SHORTCUT (sidebar via context)
// ═══════════════════════════════════════════
// When right-clicking a notebook, also allow opening tasks
// This is handled in nbCtx above — but we can add a nav item:
function openNBTasks(nbId){openTasks(nbId);}

// ═══════════════════════════════════════════
// INIT COMPLETE
// ═══════════════════════════════════════════
renderSB();
